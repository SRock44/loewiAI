# =============================================================================
# Main Branch CI Pipeline (Merge Gate)
# =============================================================================
# Runs on PRs targeting main. Enforces that only the dev branch can merge
# into main, and all quality checks must pass first.
# =============================================================================

name: Main CI

on:
  pull_request:
    branches: [main]

# Placeholder env vars so the Vite build compiles without real secrets.
env:
  VITE_FIREBASE_API_KEY: ci_placeholder
  VITE_FIREBASE_AUTH_DOMAIN: ci_placeholder
  VITE_FIREBASE_PROJECT_ID: ci_placeholder
  VITE_FIREBASE_STORAGE_BUCKET: ci_placeholder
  VITE_FIREBASE_MESSAGING_SENDER_ID: ci_placeholder
  VITE_FIREBASE_APP_ID: ci_placeholder
  VITE_GEMINI_API_KEY: ci_placeholder
  VITE_GOOGLE_CLIENT_ID: ci_placeholder
  VITE_GROQ_API_KEY: ci_placeholder

jobs:
  pr-source-check:
    name: Verify PR source is dev
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "::error::PRs to main must come from the dev branch. Source branch: ${{ github.head_ref }}"
            exit 1
          fi
          echo "Source branch is dev — OK"

  ci:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    needs: pr-source-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # TODO: Remove continue-on-error once existing lint issues are fixed
        continue-on-error: true
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
