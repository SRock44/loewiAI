# =============================================================================
# Dev Branch CI Pipeline
# =============================================================================
# Runs on every push to dev and on PRs targeting dev.
# Steps: lint -> typecheck -> test -> build
# =============================================================================

name: Dev CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

# Placeholder env vars so the Vite build compiles without real secrets.
# Real keys are only needed at runtime, not during CI builds.
env:
  VITE_FIREBASE_API_KEY: ci_placeholder
  VITE_FIREBASE_AUTH_DOMAIN: ci_placeholder
  VITE_FIREBASE_PROJECT_ID: ci_placeholder
  VITE_FIREBASE_STORAGE_BUCKET: ci_placeholder
  VITE_FIREBASE_MESSAGING_SENDER_ID: ci_placeholder
  VITE_FIREBASE_APP_ID: ci_placeholder
  VITE_GEMINI_API_KEY: ci_placeholder
  VITE_GOOGLE_CLIENT_ID: ci_placeholder
  VITE_GROQ_API_KEY: ci_placeholder

jobs:
  ci:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # TODO: Remove continue-on-error once existing lint issues are fixed
        continue-on-error: true
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
